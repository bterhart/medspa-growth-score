<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MedSpa Growth Score — Find Your #1 Revenue Leak</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:              #f8f6f3;
      --card:            #ffffff;
      --primary:         #2c4a3e;
      --primary-light:   #3d6b5c;
      --accent:          #c9a96e;
      --accent-light:    #f0e4c8;
      --text:            #1a1a1a;
      --muted:           #6b7280;
      --border:          #e5e2dd;
      --insight-bg:      #eef7f3;
      --insight-border:  #a8d5c2;
    }

    body {
      font-family: Georgia, 'Times New Roman', serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* ── Progress bar ─────────────────────────────────────────────── */
    #progressWrap {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      background: var(--card);
      border-bottom: 1px solid var(--border);
      padding: 14px 24px;
      display: none;
      align-items: center;
      gap: 16px;
    }
    .progress-track {
      flex: 1;
      height: 6px;
      background: var(--border);
      border-radius: 999px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--primary), var(--primary-light));
      border-radius: 999px;
      transition: width 0.4s ease;
    }
    .progress-label {
      font-family: Arial, sans-serif;
      font-size: 13px;
      color: var(--muted);
      white-space: nowrap;
    }

    /* ── Layout ───────────────────────────────────────────────────── */
    #container {
      width: 100%;
      max-width: 640px;
      padding: 100px 24px 60px;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ── Step animation ───────────────────────────────────────────── */
    .step {
      width: 100%;
      animation: fadeUp 0.4s ease both;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Typography ───────────────────────────────────────────────── */
    .step-label {
      font-family: Arial, sans-serif;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 10px;
    }
    .step-title {
      font-size: clamp(24px, 4vw, 32px);
      font-weight: 700;
      line-height: 1.25;
      color: var(--primary);
      margin-bottom: 12px;
    }
    .step-sub {
      font-family: Arial, sans-serif;
      font-size: 15px;
      color: var(--muted);
      line-height: 1.65;
      margin-bottom: 30px;
    }

    /* ── Options ──────────────────────────────────────────────────── */
    .options {
      display: flex;
      flex-direction: column;
      gap: 11px;
      margin-bottom: 26px;
    }
    .option {
      display: flex;
      align-items: center;
      gap: 18px;
      padding: 15px 20px;
      background: var(--card);
      border: 2px solid var(--border);
      border-radius: 12px;
      cursor: pointer;
      transition: border-color 0.18s, background 0.18s;
      font-family: Arial, sans-serif;
      font-size: 15px;
      color: var(--text);
      text-align: left;
    }
    .option:hover            { border-color: var(--primary-light); background: #f0f7f4; }
    .option.selected         { border-color: var(--primary); background: #eef7f3; color: var(--primary); font-weight: 600; }
    .option-check {
      flex-shrink: 0;
      width: 22px; height: 22px;
      border-radius: 50%;
      border: 2px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.18s;
    }
    .option.multi .option-check { border-radius: 5px; }
    .option.selected .option-check {
      background: var(--primary);
      border-color: var(--primary);
    }
    .option.selected .option-check::after {
      content: '';
      display: block;
      width: 7px; height: 4px;
      border-left: 2px solid #fff;
      border-bottom: 2px solid #fff;
      transform: rotate(-45deg) translate(1px, -1px);
    }

    /* ── Icon Grid Options (Visual Variation) ─────────────────────── */
    .icon-options {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 26px;
    }
    .icon-option {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      gap: 12px;
      padding: 24px 16px;
      background: var(--card);
      border: 2px solid var(--border);
      border-radius: 14px;
      cursor: pointer;
      transition: all 0.18s;
      font-family: Arial, sans-serif;
      font-size: 14px;
      color: var(--text);
    }
    .icon-option svg {
      width: 40px; height: 40px;
      fill: none;
      stroke: var(--primary);
      stroke-width: 1.5;
      transition: stroke 0.18s;
    }
    .icon-option:hover { border-color: var(--primary-light); background: #f0f7f4; }
    .icon-option.selected { border-color: var(--primary); background: #eef7f3; color: var(--primary); font-weight: 700; box-shadow: 0 4px 14px rgba(44,74,62,0.08); }
    .icon-option.selected svg { stroke: var(--primary); stroke-width: 2; }
    
    @media (max-width: 480px) {
      .icon-options { grid-template-columns: 1fr; }
      .icon-option { flex-direction: row; text-align: left; padding: 16px; justify-content: flex-start; }
      .icon-option svg { width: 32px; height: 32px; }
    }

    /* ── Insight card ─────────────────────────────────────────────── */
    .insight-card {
      background: var(--insight-bg);
      border: 1px solid var(--insight-border);
      border-left: 4px solid var(--primary);
      border-radius: 14px;
      padding: 24px;
      margin-bottom: 32px;
    }
    .insight-eyebrow {
      font-family: Arial, sans-serif;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--primary-light);
      margin-bottom: 8px;
    }
    .insight-stat {
      font-size: clamp(30px, 6vw, 46px);
      font-weight: 700;
      color: var(--primary);
      line-height: 1;
      margin-bottom: 10px;
    }
    .insight-body {
      font-family: Arial, sans-serif;
      font-size: 14px;
      line-height: 1.7;
      color: #374151;
    }

    /* ── Interstitial (The "Not Your Fault" Screen) ───────────────── */
    .interstitial-card {
      background: var(--card);
      border: 2px solid var(--primary-light);
      border-radius: 16px;
      padding: 40px 32px;
      text-align: center;
      margin-bottom: 32px;
      box-shadow: 0 12px 32px rgba(44,74,62,0.08);
    }
    .interstitial-icon {
      margin: 0 auto 20px;
      width: 64px; height: 64px;
      background: var(--insight-bg);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
    }
    .interstitial-title {
      font-size: 26px; font-weight: 700; color: var(--primary); margin-bottom: 16px; line-height: 1.3;
    }
    .interstitial-body {
      font-family: Arial, sans-serif; font-size: 15px; line-height: 1.7; color: #374151;
    }

    /* ── Bar chart (Static) ───────────────────────────────────────── */
    .bar-chart {
      margin-top: 22px;
      padding-top: 4px;
      border-top: 1px solid var(--insight-border);
    }
    .bc-title {
      font-family: Arial, sans-serif;
      font-size: 11px;
      color: var(--muted);
      font-style: italic;
      margin-bottom: 14px;
    }
    .bc-body {
      display: flex;
      align-items: stretch;
      gap: 8px;
      height: 152px;
    }
    .bc-col {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-width: 0;
    }
    .bc-val {
      font-family: Arial, sans-serif;
      font-size: 11px;
      font-weight: 700;
      height: 18px;
      line-height: 18px;
      opacity: 0;
      white-space: nowrap;
      transition: opacity 0.35s ease;
    }
    .bc-spacer { flex: 1; }
    .bc-fill {
      width: 100%;
      height: 0;
      border-radius: 4px 4px 0 0;
      transition: height 0.72s cubic-bezier(0.34, 1.3, 0.64, 1);
    }
    .bc-label {
      font-family: Arial, sans-serif;
      font-size: 9.5px;
      color: var(--muted);
      text-align: center;
      margin-top: 6px;
      line-height: 1.35;
      height: 28px;
    }

    /* ── Buttons ──────────────────────────────────────────────────── */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 16px 32px;
      border-radius: 10px;
      font-family: Arial, sans-serif;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: all 0.2s ease;
      text-decoration: none;
    }
    .btn-primary { background: var(--primary); color: #fff; }
    .btn-primary:hover {
      background: var(--primary-light);
      transform: translateY(-1px);
      box-shadow: 0 4px 14px rgba(44,74,62,0.28);
    }
    .btn-accent { background: var(--accent); color: #fff; }
    .btn-accent:hover {
      background: #b8934a;
      transform: translateY(-1px);
      box-shadow: 0 4px 14px rgba(201,169,110,0.38);
    }
    .btn-full { width: 100%; }
    .btn:disabled { opacity: 0.45; cursor: not-allowed; transform: none !important; box-shadow: none !important; }
    .btn-wrap-center { display: flex; justify-content: center; margin-top: 10px; }

    /* ── Welcome ──────────────────────────────────────────────────── */
    .welcome-badge {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 6px 16px;
      background: var(--accent-light);
      border-radius: 999px;
      font-family: Arial, sans-serif;
      font-size: 12px;
      font-weight: 700;
      color: #7a5a20;
      margin-bottom: 26px;
    }
    .badge-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); }
    .welcome-title {
      font-size: clamp(28px, 5vw, 42px);
      font-weight: 700;
      line-height: 1.2;
      color: var(--primary);
      margin-bottom: 18px;
    }
    .welcome-body {
      font-family: Arial, sans-serif;
      font-size: 16px;
      line-height: 1.75;
      color: #374151;
      margin-bottom: 30px;
    }
    .welcome-meta {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
      margin-bottom: 32px;
    }
    .meta-item {
      display: flex;
      align-items: center;
      gap: 7px;
      font-family: Arial, sans-serif;
      font-size: 13px;
      color: var(--muted);
    }
    .meta-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); }

    /* ── Email gate ───────────────────────────────────────────────── */
    .text-input {
      width: 100%;
      padding: 16px 20px;
      border: 2px solid var(--border);
      border-radius: 10px;
      font-family: Arial, sans-serif;
      font-size: 16px;
      color: var(--text);
      background: var(--card);
      outline: none;
      transition: border-color 0.2s;
    }
    .text-input:focus { border-color: var(--primary); }
    .input-group { display: flex; flex-direction: column; gap: 12px; margin-bottom: 16px; }
    .privacy-note {
      font-family: Arial, sans-serif;
      font-size: 12px;
      color: var(--muted);
      text-align: center;
      margin-top: 10px;
    }

    /* ── Loading screen (Gamified) ────────────────────────────────── */
    .loading-step {
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 340px;
      padding: 20px 0;
    }
    .loading-icon {
      width: 80px;
      height: 80px;
      margin: 0 auto 30px;
    }
    .loading-title {
      font-size: clamp(20px, 4vw, 27px);
      font-weight: 700;
      color: var(--primary);
      margin-bottom: 10px;
      line-height: 1.3;
      max-width: 380px;
    }
    .loading-sub {
      font-family: Arial, sans-serif;
      font-size: 15px;
      color: var(--primary);
      font-weight: 600;
      margin-bottom: 38px;
      line-height: 1.6;
      max-width: 340px;
      min-height: 48px; /* prevents layout shift */
      transition: opacity 0.3s ease;
    }
    .loading-track {
      width: 100%;
      max-width: 300px;
      height: 6px;
      background: var(--border);
      border-radius: 999px;
      overflow: hidden;
    }
    .loading-fill {
      height: 100%;
      width: 0;
      background: linear-gradient(90deg, var(--primary), var(--accent));
      border-radius: 999px;
    }

    /* ── Dynamic input ────────────────────────────────────────────── */
    .dynamic-input-wrap {
      margin-top: 18px;
      padding: 14px 16px;
      background: rgba(44,74,62,0.07);
      border-radius: 10px;
    }
    .dynamic-label {
      font-family: Arial, sans-serif;
      font-size: 13px;
      color: var(--primary);
      display: block;
      margin-bottom: 10px;
    }
    .dynamic-slider {
      width: 100%;
      accent-color: var(--primary);
      cursor: pointer;
      height: 4px;
    }
    .compound-control .dynamic-slider {
      width: 100%;
      height: 4px;
      margin: 8px 0 4px;
      transform: none;
      accent-color: var(--primary);
      cursor: pointer;
      display: block;
    }
    .slider-range {
      display: flex;
      justify-content: space-between;
      font-family: Arial, sans-serif;
      font-size: 11px;
      color: var(--muted);
      margin-top: 6px;
    }

    /* ── Line chart (Compound Effect / Dynamics) ───────────────── */
    .line-chart-wrapper {
      margin-top: 22px;
      padding-top: 24px;
      border-top: 1px solid var(--insight-border);
    }
    .line-chart {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
      align-items: stretch;
    }
    
    @media (max-width: 768px) {
      .line-chart { grid-template-columns: 1fr; gap: 32px; }
      .slider-range { display: none; } 
      .compound-control { padding: 6px 10px; margin-bottom: 2px; }
      .compound-control .dynamic-slider { margin: 4px 0 2px; }
    }

    .lc-legend {
      display: flex;
      flex-wrap: wrap;
      gap: 10px 18px;
      margin-top: 24px;
      justify-content: center;
      grid-column: 1 / -1; 
    }
    .lc-legend-item {
      display: flex;
      align-items: center;
      gap: 7px;
      font-family: Arial, sans-serif;
      font-size: 11px;
      color: #374151;
    }
    .lc-swatch { width: 20px; height: 10px; border-radius: 3px; flex-shrink: 0; }
    
    .compound-compare {
      padding: 16px;
      border: 1px solid var(--insight-border);
      border-radius: 14px;
      background: linear-gradient(180deg, rgba(255,255,255,0.75), rgba(248,245,240,0.95));
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      position: relative;
    }
    .compound-compare-head {
      display: flex;
      justify-content: center;
      align-items: center;
      margin-bottom: 20px;
    }
    .compound-compare-delta {
      font-family: Arial, sans-serif;
      font-size: 13px;
      font-weight: 700;
      color: #fff;
      background: linear-gradient(135deg, var(--accent), #fb923c);
      padding: 8px 16px;
      border-radius: 999px;
      box-shadow: 0 10px 24px rgba(249,115,22,0.22);
      white-space: nowrap;
      position: relative;
      z-index: 10;
    }
    
    .target-revenue-line {
      position: absolute;
      left: 0; right: 0;
      border-top: 2px dashed var(--accent);
      z-index: 5;
      display: flex;
      align-items: center;
      transition: bottom 0.7s cubic-bezier(0.34, 1.3, 0.64, 1);
      pointer-events: none;
    }
    .target-revenue-label {
      background: var(--card);
      color: var(--accent);
      font-family: Arial, sans-serif;
      font-size: 10px;
      font-weight: 700;
      padding: 2px 8px;
      border: 1px solid var(--accent);
      border-radius: 999px;
      margin-left: 8px;
      transform: translateY(-50%);
    }

    .compound-bars {
      display: flex;
      justify-content: space-around;
      align-items: flex-end;
      height: 220px; 
      position: relative;
    }
    .compound-bar-col {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      flex: 1;
      height: 100%;
      justify-content: flex-end;
      z-index: 8;
    }
    .compound-bar-value {
      font-family: Arial, sans-serif;
      font-size: 13px;
      font-weight: 700;
      line-height: 1.05;
      margin-bottom: 8px;
      color: var(--primary);
    }
    .compound-bar-shell {
      width: 100%;
      max-width: 50px;
      height: 100%;
      display: flex;
      align-items: flex-end;
      position: relative;
      border-bottom: 2px solid rgba(209,213,219,0.8);
    }
    .compound-baseline-marker {
      position: absolute;
      left: -15%;
      right: -15%;
      height: 0;
      border-top: 2px dashed rgba(44,74,62,0.5);
      z-index: 2;
      pointer-events: none;
      transition: bottom 0.7s cubic-bezier(0.34, 1.3, 0.64, 1);
    }
    .compound-bar {
      width: 100%;
      height: 2%; 
      border-radius: 6px 6px 0 0;
      transition: height 0.7s cubic-bezier(0.34, 1.3, 0.64, 1);
    }
    
    .compound-bar.current { background: #d1d5db; }
    .compound-bar.projected { background: linear-gradient(180deg, #fb923c, #ea580c); }
    .compound-bar.bad { background: linear-gradient(180deg, #ef4444, #b91c1c); box-shadow: 0 0 15px rgba(239,68,68,0.3); }
    
    .compound-bar-label {
      font-family: Arial, sans-serif;
      font-size: 11px;
      font-weight: 700;
      color: #374151;
      margin-top: 10px;
    }
    .compound-bar-sub {
      font-family: Arial, sans-serif;
      font-size: 10px;
      color: var(--muted);
      margin-top: 2px;
    }
    
    /* Annual Impact Card */
    .annual-impact-card {
      margin-top: 16px;
      padding: 20px;
      background: linear-gradient(135deg, #059669, #10b981);
      border-radius: 14px;
      color: white;
      text-align: center;
      box-shadow: 0 10px 24px rgba(5,150,105,0.25);
    }
    .annual-impact-label {
      font-family: Arial, sans-serif;
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      opacity: 0.9;
      margin-bottom: 8px;
    }
    .annual-impact-value {
      font-size: 36px;
      font-weight: 700;
      line-height: 1.1;
      margin-bottom: 6px;
    }
    .annual-impact-sub {
      font-family: Arial, sans-serif;
      font-size: 13px;
      opacity: 0.85;
    }

    .compound-controls { display: grid; gap: 8px; }
    .compound-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 8px; }
    
    .compound-control {
      padding: 8px 10px 7px;
      background: rgba(44,74,62,0.07);
      border-radius: 12px;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      min-height: 0;
    }
    .compound-control-head {
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      gap: 2px;
      align-items: center;
      margin-bottom: 2px;
    }
    .compound-name {
      font-family: Arial, sans-serif;
      font-size: 11px;
      font-weight: 700;
      color: var(--primary);
      letter-spacing: 0.02em;
    }
    .compound-value {
      font-family: Arial, sans-serif;
      font-size: 12px;
      color: #374151;
      text-align: center;
      white-space: nowrap;
    }
    .compound-note {
      font-family: Arial, sans-serif;
      font-size: 10px;
      color: var(--muted);
      line-height: 1.35;
      margin-top: 6px;
      text-align: center;
    }

    /* ── Results ──────────────────────────────────────────────────── */
    .results-header { text-align: center; margin-bottom: 36px; }
    .score-ring {
      width: 148px; height: 148px;
      border-radius: 50%;
      background: var(--primary);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      margin: 0 auto 20px;
      box-shadow: 0 6px 24px rgba(44,74,62,0.25);
    }
    .score-number { font-size: 52px; font-weight: 700; color: #fff; line-height: 1; }
    .score-ring-label { font-family: Arial, sans-serif; font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; color: rgba(255,255,255,0.75); margin-top: 4px; }
    .results-title { font-size: 26px; font-weight: 700; color: var(--primary); margin-bottom: 8px; }
    .results-desc { font-family: Arial, sans-serif; font-size: 15px; color: var(--muted); line-height: 1.65; max-width: 460px; margin: 0 auto; }

    .pillar-section-label {
      font-family: Arial, sans-serif;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--accent);
      margin: 28px 0 14px;
    }
    .pillars { display: flex; flex-direction: column; gap: 14px; margin-bottom: 32px; }
    .pillar-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 22px 24px;
    }
    .pillar-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }

//  GLOBAL ANIMATION HELPER & MATH
// ─────────────────────────────────────────────────────────────────────────────
const animatedValues = {};
function animateValue(id, endValue, formatFn, duration = 600) {
  const el = document.getElementById(id);
  if (!el) return;
  const startValue = animatedValues[id] || 0;
  if (startValue === endValue) {
      el.textContent = formatFn(endValue);
      return;
  }
  let startTimestamp = null;
  const step = (timestamp) => {
    if (!startTimestamp) startTimestamp = timestamp;
    const progress = Math.min((timestamp - startTimestamp) / duration, 1);
    const easeOutQuart = 1 - Math.pow(1 - progress, 4); 
    const current = startValue + (endValue - startValue) * easeOutQuart;
    
    el.textContent = formatFn(current);
    if (progress < 1) {
      window.requestAnimationFrame(step);
    } else {
      el.textContent = formatFn(endValue);
      animatedValues[id] = endValue;
    }
  };
  window.requestAnimationFrame(step);
}

// Custom Revenue Math (Non-Linear for $10k to $300k+ scale)
function sliderToRev(s) {
  s = Number(s);
  if (s <= 20) return 10 + (s * 1); // 0-20 -> 10k to 30k
  if (s <= 80) return 30 + ((s - 20) * 2.8333); // 20-80 -> 30k to 200k
  return 200 + ((s - 80) * 5); // 80-100 -> 200k to 300k
}
function revToSlider(r) {
  r = Number(r);
  if (r <= 30) return (r - 10) / 1;
  if (r <= 200) return 20 + ((r - 30) / 2.8333);
  return 80 + ((r - 200) / 5);
}

function sliderToSpend(s) {
  s = Number(s);
  if (s <= 15) return 100 + (s * 60);         
  if (s <= 75) return 1000 + ((s - 15) * 50);  
  return 4000 + ((s - 75) * 240);              
}
function spendToSlider(spend) {
  const v = Math.max(100, Math.min(10000, Number(spend) || 1200));
  if (v <= 1000) return Math.round((v - 100) / 60);
  if (v <= 4000) return 15 + Math.round((v - 1000) / 50);
  return 75 + Math.round((v - 4000) / 240);
}
function compactMoney(n) {
  if (n >= 1000000) return `$${(n/1000000).toFixed(2)}M`;
  if (n >= 1000) return `$${(n/1000).toFixed(1)}K`;

const SCORE_EXPONENT = 1.8;

function curveScore(raw) {
  return Math.max(1, Math.round(Math.pow(raw / 100, SCORE_EXPONENT) * 100));
}

function computeScores() {
  const buckets = { marketing: [], acquisition: [], retention: [] };
  SCORED_STEPS.forEach(s => {
    const ans = state.answers[s.id];
    if (ans !== undefined && s.pillar && !isNaN(Number(ans)))
      buckets[s.pillar].push(curveScore(Number(ans)));
  });
  const avg = arr => arr.length ? Math.round(arr.reduce((a,b)=>a+b,0)/arr.length) : 50;
  const sc = {
    marketing:   avg(buckets.marketing),
    acquisition: avg(buckets.acquisition),
    retention:   avg(buckets.retention),
  };
  sc.overall = Math.round((sc.marketing + sc.acquisition + sc.retention) / 3);
  return sc;
}

function updateProgress() {
  const s = STEPS[state.step];
  const wrap = document.getElementById('progressWrap');
  if (['welcome','results','loading'].includes(s.type)) { wrap.style.display='none'; return; }
  wrap.style.display = 'flex';
  let passed = 0;
  for (let i = 0; i < state.step; i++) { if (STEPS[i].type === 'question') passed++; }
  const total = QUESTION_STEPS.length;
  document.getElementById('progressFill').style.width = Math.min(100, Math.round(passed/total*100))+'%';
  document.getElementById('progressLabel').textContent = `${passed} of ${total}`;
}

function render() {
  updateProgress();
  const s = STEPS[state.step];
  const map = {
    welcome:      renderWelcome,
    question:     () => renderQuestion(s),
    insight:      () => renderInsight(s),
    interstitial: () => renderInterstitial(s),
    email_gate:   renderEmailGate,
    loading:      () => renderLoading(s),
    results:      renderResults,
  };
  document.getElementById('app').innerHTML = (map[s.type]||(() => ''))();
  bindEvents();
  afterRender();
}

function renderQuestion(s) {
  const saved = state.answers[s.id];

  if (s.inputType && s.inputType.startsWith('range')) {
    const fallback = s.defaultValue !== undefined ? s.defaultValue : (s.min ?? 0);
    const rawValue = saved !== undefined && saved !== null && saved !== '' ? Number(saved) : fallback;
    
    let sliderValue = rawValue;
    if (s.inputType === 'range-nonlinear-spend') sliderValue = spendToSlider(rawValue);
    if (s.inputType === 'range-nonlinear-rev') sliderValue = revToSlider(rawValue);
    
    const hasValue = rawValue !== undefined && rawValue !== null && rawValue !== '';
    
    const formatSliderValue = value => {
      const displayNum = Number(value);
      if (s.inputType === 'range-nonlinear-rev') return `${s.prefix}${Math.round(displayNum).toLocaleString()}k`;
      if (s.id === 'avg_visits_per_client') return `${displayNum} ${displayNum === 1 ? 'visit' : 'visits'}`;
      if (s.prefix) return `${s.prefix}${displayNum.toLocaleString()}`;
      if (s.suffix) return `${displayNum}${s.suffix}`;
      return String(displayNum);
    };

    return `<div class="step">
      ${s.label?`<div class="step-label">${s.label}</div>`:''}
      <h2 class="step-title">${s.title}</h2>
      ${s.sub?`<p class="step-sub">${s.sub}</p>`:''}
      <div class="dynamic-input-wrap">
        <label class="dynamic-label">Selected value: <strong id="questionSliderValue">${formatSliderValue(rawValue)}</strong></label>
        <input
          type="range"
          class="dynamic-slider"
          id="questionSlider"
          min="${s.min ?? ''}"
          max="${s.max ?? ''}"
          step="${s.step ?? 1}"
          value="${sliderValue}"
          data-question-id="${s.id}"
          data-input-type="${s.inputType || ''}"
          data-min="${s.min ?? ''}"
          data-max="${s.max ?? ''}"
          data-prefix="${(s.prefix || '').replace(/\"/g, '&quot;')}"
          data-suffix="${(s.suffix || '').replace(/\"/g, '&quot;')}"
          oninput="handleRangeInputFromElement(this)"
        />
        <div class="slider-range">
          <span>${s.inputType === 'range-nonlinear-spend' ? '$100' : (s.inputType === 'range-nonlinear-rev' ? '$10k' : formatSliderValue(s.min ?? rawValue))}</span>
          <span>${s.inputType === 'range-nonlinear-spend' ? '$10,000' : (s.inputType === 'range-nonlinear-rev' ? '$300k+' : formatSliderValue(s.max ?? rawValue))}</span>
        </div>
      </div>
      <button class="btn btn-accent btn-full" id="continueBtn"
        ${!hasValue ? 'disabled' : ''} onclick="advance(this)">
        Continue &rarr;
      </button>
    </div>`;
  }

  // Icon Grid Layout vs Standard List Layout
  if (s.visual === 'icons') {
    const opts = s.options.map(o => {
      const sel = s.multi ? (Array.isArray(saved) && saved.includes(o.value)) : saved === o.value;
      return `<div class="icon-option${sel?' selected':''}" data-value="${o.value}">
                <svg viewBox="0 0 24 24">${o.icon}</svg>
                <span>${o.text}</span>
              </div>`;
    }).join('');
    const footer = s.multi ? `<button class="btn btn-accent btn-full" id="continueBtn" ${(!saved||saved.length===0)?'disabled':''} onclick="advance(this)">Continue &rarr;</button>` : '';
    return `<div class="step">
      ${s.label?`<div class="step-label">${s.label}</div>`:''}
      <h2 class="step-title">${s.title}</h2>
      ${s.sub?`<p class="step-sub">${s.sub}</p>`:''}
      <div class="icon-options" id="options">${opts}</div>
      ${footer}</div>`;
  }

  // Standard Text Buttons
  const opts = s.options.map(o => {
    const sel = s.multi ? (Array.isArray(saved) && saved.includes(o.value)) : saved === o.value;
    return `<button class="option${s.multi?' multi':''}${sel?' selected':''}" data-value="${o.value}">
              <span class="option-check"></span><span>${o.text}</span>
            </button>`;
  }).join('');
  const footer = s.multi ? `<button class="btn btn-accent btn-full" id="continueBtn" ${(!saved||saved.length===0)?'disabled':''} onclick="advance(this)">Continue &rarr;</button>` : '';
  return `<div class="step">
    ${s.label?`<div class="step-label">${s.label}</div>`:''}
    <h2 class="step-title">${s.title}</h2>
    ${s.sub?`<p class="step-sub">${s.sub}</p>`:''}
    <div class="options" id="options">${opts}</div>
    ${footer}</div>`;
}

function updateCompoundModel() {
  if (!document.getElementById('compoundLeads')) return;

  const val = id => Number(document.getElementById(id).value);
  const leads = val('compoundLeads');
  const bookingRate = val('compoundBooking');
  const noShowRate = val('compoundNoShow');
  const closeRate = val('compoundClose');
  const avgSpend = sliderToSpend(val('compoundAvgSpend'));
  const avgVisits = val('compoundVisits');
  const estimatedLtv = avgSpend * avgVisits;

  document.getElementById('compoundLeadsVal').textContent = `${leads}/mo`;
  document.getElementById('compoundBookingVal').textContent = `${bookingRate}%`;
  document.getElementById('compoundNoShowVal').textContent = `${noShowRate}%`;
  document.getElementById('compoundCloseVal').textContent = `${closeRate}%`;
  document.getElementById('compoundAvgSpendVal').textContent = `$${avgSpend.toLocaleString()}`;
  document.getElementById('compoundVisitsVal').textContent = `${avgVisits} ${avgVisits === 1 ? 'visit' : 'visits'}`;
  document.getElementById('compoundLtvReadout').textContent = `$${estimatedLtv.toLocaleString()}`;

  const d = getCompoundDefaults();
  
  // They are already stored as actual numbers (e.g. 170) from handleRangeInput
  const userBaseline = (state.answers['current_revenue'] || 86) * 1000;
  const userTarget   = (state.answers['target_revenue'] || 170) * 1000;

  const baselineMonthlyRevenue = computeMonthlyRevenue(d.leads, d.bookingRate, d.noShowRate, d.closeRate, d.avgSpend);
  const projectedMonthlyRevenue = computeMonthlyRevenue(leads, bookingRate, noShowRate, closeRate, avgSpend);
  const projectedMonthlyLifetime = computeMonthlyLifetimeRevenue(leads, bookingRate, noShowRate, closeRate, estimatedLtv);
  
  const projectedYearClientValue = projectedMonthlyLifetime * 12;
  const monthlyDelta = projectedMonthlyRevenue - baselineMonthlyRevenue;

  const currentVal = Math.max(0, baselineMonthlyRevenue);
  const monthVal = Math.max(0, projectedMonthlyRevenue);
  
  const maxVal = Math.max(currentVal, monthVal, userTarget, 1000);

  const toPct = v => Math.max(2, (v / maxVal) * 100);
  const baselinePct = toPct(currentVal);
  const monthPct = toPct(monthVal);
  const targetPct = toPct(userTarget);

  document.getElementById('compoundBarCurrent').style.height = `${baselinePct}%`;
  document.getElementById('compoundBarProjected').style.height = `${monthPct}%`;
  
  document.getElementById('targetRevenueLine').style.bottom = `${targetPct}%`;
  document.getElementById('compoundMonthMarker').style.bottom = `${baselinePct}%`;

  const money = compactMoney;
  animateValue('compoundBarCurrentValue', currentVal, money);
  animateValue('compoundBarProjectedValue', monthVal, money);
  animateValue('compoundBarYearValue', projectedYearClientValue, money);

  animateValue('compoundDeltaBadge', Math.abs(monthlyDelta), v => `${monthlyDelta >= 0 ? '+' : '-'}${money(v)} each month`);
}

function renderBarChart(chart) {
  const bars = chart.bars.map((b, i) => `
    <div class="bc-col" data-pct="${b.pct}" data-color="${b.color}" data-val="${b.val}" style="animation-delay:${i*0.08}s">
      <div class="bc-val" style="color:${b.color}">${b.val}</div>
      <div class="bc-spacer"></div>
      <div class="bc-fill" style="background:${b.color}"></div>
      <div class="bc-label">${b.label}</div>
    </div>`).join('');
  return `<div class="bar-chart">
    <div class="bc-title">${chart.title}</div>
    <div class="bc-body">${bars}</div>
  </div>`;
}

function renderLoading(s) {
  const icon = iconScan();
  return `<div class="step loading-step">
    <div class="loading-icon">${icon}</div>
    <h2 class="loading-title">Building your custom roadmap</h2>
    <p class="loading-sub" id="loadingText">Analyzing your data...</p>
    <div class="loading-track">
      <div class="loading-fill" id="loadingFill"></div>
    </div>
  </div>`;
}

    <circle cx="34" cy="34" r="22" stroke="var(--primary)" stroke-width="5"/>
    <line x1="50" y1="50" x2="70" y2="70" stroke="var(--primary)" stroke-width="5" stroke-linecap="round"/>
    <circle cx="34" cy="34" r="12" stroke="var(--accent)" stroke-width="2.5" stroke-dasharray="9 5">
      <animateTransform attributeName="transform" type="rotate"
        values="0 34 34;360 34 34" dur="1.8s" repeatCount="indefinite"/>
    </circle>
    <line x1="12" y1="34" x2="56" y2="34" stroke="var(--accent)" stroke-width="1.5" stroke-dasharray="4 3" opacity="0.6">
      <animate attributeName="opacity" values="0.6;0.1;0.6" dur="1.2s" repeatCount="indefinite"/>
    </line>
  </svg>`;
}

function renderEmailGate() {
  return `<div class="step">
    <div class="step-label">Almost there</div>
    <h2 class="step-title">Your Growth Score is ready.</h2>
    <p class="step-sub">Enter your details and we'll show you exactly where your practice
      ranks across all three growth pillars — plus what to fix first.</p>
    <div class="input-group">
      <input type="text"  class="text-input" id="fnInput"
        placeholder="First name" value="${esc(state.firstName)}"
        oninput="state.firstName=this.value;syncBtn()"/>
      <input type="email" class="text-input" id="emInput"
        placeholder="Work email address" value="${esc(state.email)}"
        oninput="state.email=this.value;syncBtn()"/>
    </div>
    <button class="btn btn-accent btn-full" id="revealBtn"
      ${(!state.firstName||!state.email)?'disabled':''} onclick="submitLead()">
      Reveal My Growth Score &rarr;</button>
    <p class="privacy-note">&#128274; No spam. Your details are never shared or sold.</p>
  </div>`;
}

function renderResults() {
  const sc = computeScores();
  const name = state.firstName || 'there';
  const bottleneck = state.answers['bottleneck'] || 'all';

  function pillarCard(label, key) {
    const s = sc[key], t = tier(s);
    return `<div class="pillar-card">
      <div class="pillar-header">
        <span class="pillar-name">${label}</span>
        <span class="pillar-badge tier-${t}">${tierLabel(s)} &middot; ${s}/100</span>
      </div>
      <div class="pillar-track">
        <div class="pillar-fill bar-${t}" style="width:${s}%"></div>
      </div>
      <p class="pillar-insight">${pillarInsight(key, s)}</p>
    </div>`;
  }

  return `<div class="step">
    <div class="results-header">
      <div class="score-ring">
        <span class="score-number">${sc.overall}</span>
        <span class="score-ring-label">Growth Score</span>
      </div>
      <h2 class="results-title">${overallTitle(sc.overall)}</h2>
      <p class="results-desc">${overallDesc(sc.overall)}</p>
    </div>
    <div class="pillar-section-label">Your 3-Pillar Breakdown</div>
    <div class="pillars">
      ${pillarCard('Marketing &amp; Trust Signals',     'marketing')}
      ${pillarCard('Lead Acquisition &amp; Conversion', 'acquisition')}
      ${pillarCard('Retention &amp; Lifetime Value',    'retention')}
    </div>
    <div class="cta-box">
      <h3>Ready to fix your biggest leak, ${esc(name)}?</h3>
      <p>${ctaByBottleneck[bottleneck]||ctaByBottleneck['all']}</p>
      <div class="btn-wrap-center">
        <a href="#" class="btn btn-accent">Book a Free Strategy Call &rarr;</a>
      </div>
    </div>
    <p class="privacy-note">
      Results sent to ${esc(state.email)}
      &nbsp;&middot;&nbsp;
      <span class="retake-link" onclick="retake()">Retake assessment</span>
    </p>
  </div>`;
}

// ─────────────────────────────────────────────────────────────────────────────
//  AFTER RENDER — chart animations + loading progress
// ─────────────────────────────────────────────────────────────────────────────
function afterRender() {
  const s = STEPS[state.step];

  if (s.type === 'insight' && s.chart && !s.chartType) {
    const MAX_H = 88; 
    setTimeout(() => {
      document.querySelectorAll('.bc-col').forEach((col, i) => {
        setTimeout(() => {
          const pct = parseFloat(col.dataset.pct);
          const h   = Math.round(MAX_H * pct / 100);
          const fill = col.querySelector('.bc-fill');
          if (fill) fill.style.height = h + 'px';
          const val = col.querySelector('.bc-val');
          if (val) val.style.opacity = '1';
        }, i * 100);
      });
    }, 120);
  }
  
  if (s.chartType === 'noshow_math') setTimeout(() => updateNoShowChart(state.answers.monthly_leads ? state.answers.monthly_leads * 0.4 : 20), 120);
  if (s.chartType === 'leaked_leads') setTimeout(() => updateLeakedLeadChart(state.answers.monthly_leads ? state.answers.monthly_leads * 0.5 : 25), 120);
  if (s.chartType === 'cpl_math') setTimeout(() => updateCPLChart(10), 120);
  if (s.chartType === 'compound') setTimeout(() => updateCompoundModel(), 120);

  if (s.type === 'loading') {
    const fill = document.getElementById('loadingFill');
    const text = document.getElementById('loadingText');
    if (!fill || !text) return;
    
    // Slowed down to 12 seconds for maximum perceived value building
    const dur = 12000; 
    
    const targetRev = Math.round(state.answers['target_revenue'] || 170);
    const teamSizeVal = state.answers['team_size'] || 1;
    const teamSizes = {1: 'solo', 2: 'small', 3: 'growing', 4: 'large'};
    const teamType = teamSizes[teamSizeVal];
    
    // Explicitly parse selected services to build Custom loading string
    let primaryService = "treatment";
    if (state.answers.services && state.answers.services.length > 0) {
      const sMap = { 'injectables': 'Injectables', 'laser': 'Laser & Light', 'body': 'Body Contouring', 'weightloss': 'Weight Loss', 'iv': 'IV Therapy', 'hormone': 'Hormone Therapy' };
      const selectedNames = state.answers.services.map(val => sMap[val]).filter(Boolean);
      if (selectedNames.length > 1) {
          primaryService = selectedNames.slice(0, 2).join(' & ');
      } else {
          primaryService = selectedNames[0];
      }
    }

    const phrases = [
      `Analyzing your ${primaryService} margins...`,
      "Calculating the true cost of your leaked leads...",
      `Mapping retention loops for your ${teamType} team...`,
      `Plotting your path to $${targetRev}k/mo...`,
      "Finalizing your personalized Growth Score..."
    ];
    
    let phraseIndex = 0;
    text.textContent = phrases[0];
    
    const interval = setInterval(() => {
      phraseIndex++;
      if (phraseIndex < phrases.length) {
        text.style.opacity = 0;
        setTimeout(() => {
          text.textContent = phrases[phraseIndex];
          text.style.opacity = 1;
        }, 400); // smooth text fade
      } else {
        clearInterval(interval);
      }
    }, Math.floor(dur / phrases.length));

    requestAnimationFrame(() => {
      fill.style.transition = `width ${dur}ms linear`;
      fill.style.width = '100%';
    });
    
    setTimeout(() => {
        clearInterval(interval);
        advance(null, true);
    }, dur + 150);
  }
}

// ─────────────────────────────────────────────────────────────────────────────
//  EVENTS
// ─────────────────────────────────────────────────────────────────────────────
function handleRangeInputFromElement(el) {
  if (!el) return;
  const id = el.dataset.questionId || '';
  const inputType = el.dataset.inputType || '';
  const prefix = el.dataset.prefix || '';
  const suffix = el.dataset.suffix || '';
  
  let rawValue = Number(el.value);
  let stateValue = rawValue;
  let displayValue = rawValue;

  if (inputType === 'range-nonlinear-spend') {
     stateValue = sliderToSpend(rawValue);
     displayValue = stateValue;
  }
  
  if (inputType === 'range-nonlinear-rev') {
     stateValue = sliderToRev(rawValue);
     displayValue = stateValue;
  }

  state.answers[id] = stateValue;

  const readout = document.getElementById('questionSliderValue');
  if (readout) {
    if (inputType === 'range-nonlinear-rev') {
       readout.textContent = `${prefix}${Math.round(displayValue).toLocaleString()}k / mo`;
    } else if (id === 'avg_visits_per_client') {
      readout.textContent = `${displayValue} ${displayValue === 1 ? 'visit' : 'visits'}`;
    } else if (prefix) {
      readout.textContent = `${prefix}${displayValue.toLocaleString()}`;
    } else if (suffix) {
      readout.textContent = `${displayValue}${suffix}`;
    } else {
      readout.textContent = String(displayValue);
    }
  }

  const btn = document.getElementById('continueBtn');
  if (btn) btn.disabled = false;
}

let isAdvancing = false;

function bindEvents() {
  const s = STEPS[state.step];
  if (s.type !== 'question' || s.inputType) return;

  document.querySelectorAll('.option, .icon-option').forEach(el => {
    el.addEventListener('click', function() {
      if (isAdvancing) return;
      
      const val = this.dataset.value;
      
      if (s.multi) {
        let cur = state.answers[s.id];
        if (!Array.isArray(cur)) cur = [];
        cur = cur.includes(val) ? cur.filter(v=>v!==val) : [...cur,val];
        state.answers[s.id] = cur;
        
        document.querySelectorAll('.option, .icon-option').forEach(o =>
          o.classList.toggle('selected', cur.includes(o.dataset.value)));
          
        const btn = document.getElementById('continueBtn');
        if (btn) btn.disabled = cur.length === 0;
      } else {
        const parsed = isNaN(Number(val)) ? val : Number(val);
        state.answers[s.id] = parsed;
        
        document.querySelectorAll('.option, .icon-option').forEach(o => o.classList.remove('selected'));
        this.classList.add('selected');
        
        isAdvancing = true; 
        setTimeout(() => { advance(null, true); }, 350);
      }
    });
  });
}

function advance(btnElement, force = false) {
  if (btnElement && btnElement.tagName === 'BUTTON') {
      btnElement.disabled = true;
  }
  
  if (isAdvancing && !force) return;
  isAdvancing = true;

  const current = STEPS[state.step];
  
  if (current && current.type === 'question' && current.inputType && (state.answers[current.id] === undefined || state.answers[current.id] === '')) {
    state.answers[current.id] = current.defaultValue !== undefined ? current.defaultValue : current.min;
    // ensure mapped logic runs if they hit continue without sliding
    if (current.inputType === 'range-nonlinear-spend') state.answers[current.id] = sliderToSpend(current.defaultValue);
    if (current.inputType === 'range-nonlinear-rev') state.answers[current.id] = sliderToRev(current.defaultValue);
  }
  
  if (state.step < STEPS.length - 1) {
    state.step++;
    render();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }
  
  setTimeout(() => { isAdvancing = false; }, 300);
}

function syncBtn() {
  const btn = document.getElementById('revealBtn');
  if (btn) btn.disabled = !state.firstName.trim() || !state.email.includes('@');
}

function submitLead() {
  advance();
}

function retake() {
  state.step = 0;
  state.answers = {};
  state.firstName = '';
  state.email = '';
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function esc(str) {
  return String(str)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

render();
</script>
